<section class="skills">
  <div class="container">
    <div class="skills__content">
      <h2 class="skills__title">{{ title() }}</h2>

      <div class="skills__grid">
        @for (skill of skills(); track skill) {
          <div class="skills__item">
            {{ skill }}
          </div>
        }
      </div>
    </div>
  </div>
</section>
