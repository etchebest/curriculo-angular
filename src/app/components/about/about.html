<section class="about">
  <div class="container">
    <div class="about__content">
      <h2 class="about__title">{{ title() }}</h2>

      <div class="about__text">
        @for (paragraph of paragraphs(); track paragraph) {
          <p class="about__paragraph">
            {{ paragraph }}
          </p>
        }
      </div>
    </div>
  </div>
</section>
