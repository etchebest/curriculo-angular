<footer class="footer">
  <div class="container">
    <div class="footer__content">
      <div class="footer__brand">
        <p class="footer__name">
          Cristian Etchebest
        </p>
        <p class="footer__role">
          Desenvolvedor Front-End • Angular • TypeScript
        </p>
      </div>
      <nav class="footer__links">

        @for (link of links(); track link.label) {
        @if (link.external) {
        <a class="footer__link" [href]="link.href" target="_blank" rel="noopener">
          {{ link.label }}
        </a>
        } @else {
        <a class="footer__link" [routerLink]="link.href">
          {{ link.label }}
        </a>
        }
        }

      </nav>
    </div>
    <div class="footer__bottom">
      <p class="footer__copyright">
        © {{ year() }} Cristian Etchebest
      </p>
    </div>
  </div>
</footer>
